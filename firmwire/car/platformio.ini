; =============================================================================
;  platformio.ini — FPV Racer v2.0 Car Firmware
;  PlatformIO + Arduino framework for ESP32
; =============================================================================

[env:car_p1]
platform       = espressif32
board          = esp32dev
framework      = arduino
monitor_speed  = 115200
upload_speed   = 921600

build_flags =
    -D CAR_ID=1
    -D ARDUINO_RUNNING_CORE=0
    -D CONFIG_ARDUINO_LOOP_STACK_SIZE=8192

lib_deps =
    adafruit/Adafruit PN532@^1.2.2
    adafruit/Adafruit MPU6050@^2.2.4
    adafruit/Adafruit Unified Sensor@^1.1.9
    madhephaestus/ESP32Servo@^0.13.0
    ; ESP-NOW is part of the ESP32 Arduino core — no extra lib needed

[env:car_p2]
platform       = espressif32
board          = esp32dev
framework      = arduino
monitor_speed  = 115200
upload_speed   = 921600

build_flags =
    -D CAR_ID=2
    -D ARDUINO_RUNNING_CORE=0
    -D CONFIG_ARDUINO_LOOP_STACK_SIZE=8192

lib_deps =
    adafruit/Adafruit PN532@^1.2.2
    adafruit/Adafruit MPU6050@^2.2.4
    adafruit/Adafruit Unified Sensor@^1.1.9
    madhephaestus/ESP32Servo@^0.13.0
